services:
  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/stats"]
      interval: 10s
      timeout: 3s
      retries: 5
